<div class="add-student-dialog">

  <div class="dialog-header" mat-dialog-title>
    <div class="header-icon"><mat-icon>person_add</mat-icon></div>
    <div class="header-text">
      <h2>Add Student</h2>
      <p class="header-sub">{{ data.className }}</p>
    </div>
    <button class="close-btn" (click)="dialogRef.close(null)" matTooltip="Close">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <mat-dialog-content>

    <!-- Search row -->
    <div class="search-row">
      <div class="mobile-input-wrap">
        <mat-icon class="input-icon">phone</mat-icon>
        <input class="mobile-input"
               type="tel"
               [(ngModel)]="mobile"
               placeholder="Enter student mobile number"
               (keydown.enter)="search()"
               [disabled]="searching || adding">
        <button *ngIf="mobile" class="clear-input" (click)="reset()" matTooltip="Clear">
          <mat-icon>close</mat-icon>
        </button>
      </div>
      <button class="search-btn" (click)="search()"
              [disabled]="!mobile.trim() || searching || adding">
        <mat-spinner *ngIf="searching" diameter="16"></mat-spinner>
        <mat-icon *ngIf="!searching">search</mat-icon>
        <span>{{ searching ? 'Searching…' : 'Search' }}</span>
      </button>
    </div>

    <!-- Search error -->
    <div class="msg-error" *ngIf="searchError">
      <mat-icon>error_outline</mat-icon> {{ searchError }}
    </div>

    <!-- Found student card -->
    <div class="student-card" *ngIf="foundStudent && !addSuccess">
      <div class="student-avatar">{{ foundStudent.name.charAt(0).toUpperCase() }}</div>
      <div class="student-info">
        <div class="student-name">{{ foundStudent.name }}</div>
        <div class="student-mobile">{{ foundStudent.mobile }}</div>
      </div>
      <mat-icon class="student-check">check_circle</mat-icon>
    </div>

    <!-- Add error -->
    <div class="msg-error" *ngIf="addError">
      <mat-icon>error_outline</mat-icon> {{ addError }}
    </div>

    <!-- Success state -->
    <div class="msg-success" *ngIf="addSuccess">
      <mat-icon>check_circle</mat-icon>
      <span><strong>{{ foundStudent?.name }}</strong> added to {{ data.className }}!</span>
    </div>

  </mat-dialog-content>

  <mat-dialog-actions align="end">
    <button class="cancel-btn" (click)="dialogRef.close(null)" [disabled]="adding">Cancel</button>
    <button class="add-btn" (click)="add()"
            [disabled]="!foundStudent || adding || addSuccess">
      <mat-spinner *ngIf="adding" diameter="16"></mat-spinner>
      <mat-icon *ngIf="!adding">person_add</mat-icon>
      <span>{{ adding ? 'Adding…' : 'Add to Class' }}</span>
    </button>
  </mat-dialog-actions>

</div>
