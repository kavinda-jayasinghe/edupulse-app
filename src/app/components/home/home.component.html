<div class="dashboard">

  <!-- ── Welcome Banner ── -->
  <section class="welcome-banner">
    <div class="welcome-inner">
      <div class="welcome-text">
        <h1>Welcome back, <span class="highlight">{{ studentName }}</span> 👋</h1>
      </div>
      <div class="banner-actions">
        <button mat-raised-button color="accent" routerLink="/exams" class="cta-btn">
          <mat-icon>play_circle</mat-icon> Start New Exam
        </button>
        <div class="banner-join">
          <div class="bj-row">
            <div class="bj-input-wrap" [class.bj-error]="joinError" [class.bj-success]="joinSuccess">
              <mat-icon>vpn_key</mat-icon>
              <input class="bj-input" type="text" [(ngModel)]="classCode"
                     placeholder="Class code"
                     (ngModelChange)="classCode = classCode.toUpperCase(); joinError = ''; joinSuccess = ''"
                     (keydown.enter)="joinClass()"
                     maxlength="20">
            </div>
            <button class="bj-btn" (click)="joinClass()" [disabled]="!classCode.trim() || joining">
              <mat-spinner *ngIf="joining" diameter="15"></mat-spinner>
              <mat-icon *ngIf="!joining">login</mat-icon>
              <span>{{ joining ? 'Joining…' : 'Join Room' }}</span>
            </button>
          </div>
          <div class="bj-msg bj-msg-success" *ngIf="joinSuccess">
            <mat-icon>check_circle</mat-icon> {{ joinSuccess }}
          </div>
          <div class="bj-msg bj-msg-error" *ngIf="joinError">
            <mat-icon>error_outline</mat-icon> {{ joinError }}
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Loading -->
  <div class="center-spin" *ngIf="loading">
    <mat-spinner diameter="48"></mat-spinner>
  </div>

  <!-- Error -->
  <div class="error-banner" *ngIf="error && !loading">
    <mat-icon>warning</mat-icon> {{ error }}
  </div>

  <div class="content" *ngIf="!loading">

    <!-- ── Enrolled Classes ── -->
    <div class="classes-section" *ngIf="enrolledClasses.length > 0">
      <div class="section-label">
        <mat-icon>class</mat-icon> My Classes
        <span class="class-count">{{ enrolledClasses.length }}</span>
      </div>
      <div class="class-cards">
        <div class="class-card" *ngFor="let cls of enrolledClasses">
          <div class="cc-icon"><mat-icon>school</mat-icon></div>
          <span class="cc-name">{{ cls.name }}</span>
        </div>
      </div>
    </div>

  </div>
</div>
