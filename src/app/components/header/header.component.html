<mat-toolbar color="primary" class="mat-elevation-z4 app-header">

  <!-- Logo -->
  <a [routerLink]="isAdmin ? '/admin' : isTeacher ? '/teacher' : '/home'" class="logo-link">
    <mat-icon class="logo-icon">school</mat-icon>
    <span class="logo-text">EduPulse</span>
  </a>

  <!-- Center Navigation -->
  <nav class="nav-links">
    <!-- Admin nav -->
    <ng-container *ngIf="isAdmin">
      <a mat-button routerLink="/admin" routerLinkActive="active-link">
        <mat-icon>dashboard</mat-icon>
        <span>Admin Dashboard</span>
      </a>
    </ng-container>

    <!-- Teacher nav -->
    <ng-container *ngIf="isTeacher">
      <a mat-button routerLink="/teacher" routerLinkActive="active-link">
        <mat-icon>school</mat-icon>
        <span>My Classes</span>
      </a>
    </ng-container>

    <!-- Student nav -->
    <ng-container *ngIf="!isAdmin && !isTeacher">
      <a mat-button routerLink="/home" routerLinkActive="active-link" [routerLinkActiveOptions]="{exact:true}">
        <mat-icon>home</mat-icon>
        <span>Home</span>
      </a>
      <a mat-button routerLink="/exams" routerLinkActive="active-link">
        <mat-icon>description</mat-icon>
        <span>Exams</span>
      </a>
      <a mat-button routerLink="/rankings" routerLinkActive="active-link">
        <mat-icon>leaderboard</mat-icon>
        <span>Rankings</span>
      </a>
    </ng-container>
  </nav>

  <span class="spacer"></span>

  <!-- Notifications -->
  <button mat-icon-button
          routerLink="/notifications"
          routerLinkActive="active-link"
          class="icon-btn"
          matTooltip="Notifications"
          [matBadge]="unreadCount"
          matBadgeColor="warn"
          matBadgeSize="small"
          [matBadgeHidden]="unreadCount === 0">
    <mat-icon>notifications</mat-icon>
  </button>

  <!-- Profile Dropdown -->
  <button mat-icon-button [matMenuTriggerFor]="profileMenu" class="profile-btn icon-btn" matTooltip="My Account">
    <mat-icon>account_circle</mat-icon>
  </button>

  <mat-menu #profileMenu="matMenu">
    <div class="menu-header" (click)="$event.stopPropagation()">
      <strong>{{ userName }}</strong>
      <small *ngIf="isAdmin"   class="admin-label">Administrator</small>
      <small *ngIf="isTeacher" class="teacher-label">Teacher</small>
    </div>
    <mat-divider></mat-divider>
    <button mat-menu-item routerLink="/profile">
      <mat-icon>person</mat-icon>
      <span>My Profile</span>
    </button>
    <mat-divider></mat-divider>
    <button mat-menu-item class="logout-item" (click)="logout()">
      <mat-icon>logout</mat-icon>
      <span>Logout</span>
    </button>
  </mat-menu>

</mat-toolbar>
