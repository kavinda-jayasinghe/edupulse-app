<div class="notif-page">
  <div class="page-header">
    <div>
      <h1><mat-icon>notifications</mat-icon> Notifications</h1>
      <p *ngIf="unreadCount > 0">{{ unreadCount }} unread notification{{ unreadCount > 1 ? 's' : '' }}</p>
      <p *ngIf="unreadCount === 0 && !loading">All caught up!</p>
    </div>
    <button mat-button color="primary" (click)="markAllRead()" *ngIf="unreadCount > 0">
      <mat-icon>done_all</mat-icon> Mark all as read
    </button>
  </div>

  <div class="page-content">
    <div class="center-spin" *ngIf="loading"><mat-spinner diameter="48"></mat-spinner></div>
    <div class="error-banner" *ngIf="error"><mat-icon>warning</mat-icon> {{ error }}</div>

    <mat-card class="notif-card" *ngIf="!loading">
      <div *ngFor="let n of notifications" class="notif-item" [class.unread]="!n.is_read" (click)="markRead(n)">
        <div class="notif-icon" [style.background]="n.icon_color + '1a'">
          <mat-icon [style.color]="n.icon_color">{{ n.icon }}</mat-icon>
        </div>
        <div class="notif-body">
          <div class="notif-title">
            {{ n.title }}
            <span *ngIf="!n.is_read" class="unread-dot"></span>
          </div>
          <div class="notif-msg">{{ n.message }}</div>
          <div class="notif-time">{{ n.created_at | date:'medium' }}</div>
        </div>
      </div>
      <div *ngIf="!notifications.length" class="empty-state">
        <mat-icon>notifications_none</mat-icon>
        <p>No notifications yet</p>
      </div>
    </mat-card>
  </div>
</div>
